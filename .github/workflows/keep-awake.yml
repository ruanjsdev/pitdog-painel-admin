name: Keep Render Awake

on:
  schedule:
    # America/Belem is UTC-3. Keep awake from 18:00 to 04:00 local time.
    - cron: "*/10 21-23,0-6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Pits Dog services
        shell: bash
        run: |
          set -u

          urls=(
            "https://pitsdog-painel-admin.onrender.com"
            "https://pitsdog-cardapio-oficial.onrender.com"
            "https://pits-dog-bot.onrender.com/health"
          )

          for url in "${urls[@]}"; do
            echo "Pinging ${url}"
            curl --silent --show-error --location --max-time 25 --retry 2 --retry-delay 3 "$url" >/dev/null \
              && echo "OK ${url}" \
              || echo "WARN ${url} did not answer in time"
          done
